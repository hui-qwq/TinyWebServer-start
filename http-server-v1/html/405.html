<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>405 Method Not Allowed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background: #f8f6ff;
        }
        .box {
            width: 540px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #5e35b1;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        a:hover {
            background: #4527a0;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>405 Method Not Allowed</h1>
        <p>This HTTP method is not supported for the requested URL.</p>
        <a href="/">Back Home</a>
    </div>
</body>
</html>
