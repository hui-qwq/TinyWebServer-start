<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Hello</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background: #fffaf0;
        }
        .box {
            width: 500px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #2196F3;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        a:hover {
            background: #1976D2;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Hello Page 👋</h1>
        <p>Hello, WebServer!</p>
        <a href="/">Back Home</a>
    </div>
</body>
</html>
