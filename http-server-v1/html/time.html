<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Time Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background: #eef6ff;
        }
        .box {
            width: 560px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #ff9800;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
        }
        a:hover {
            background: #f57c00;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Time Page</h1>
        <p>This is a static HTML page for <code>/time</code>.</p>
        <p>If you need real-time clock later, we can add JS or backend rendering.</p>
        <a href="/">Back Home</a>
    </div>
</body>
</html>
