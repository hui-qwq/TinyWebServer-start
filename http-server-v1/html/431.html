<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>431 Request Header Fields Too Large</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background: #fff8f2;
        }
        .box {
            width: 560px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        h1 {
            margin-top: 0;
            color: #d84315;
        }
        p {
            color: #555;
            line-height: 1.6;
        }
        .tips {
            text-align: left;
            display: inline-block;
            margin-top: 8px;
            color: #666;
        }
        a {
            display: inline-block;
            margin-top: 22px;
            padding: 10px 20px;
            background: #ff7043;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        a:hover {
            background: #f4511e;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>431 Request Header Fields Too Large</h1>
        <p>Your request headers are too large for this server to process.</p>
        <div class="tips">
            <div>Try one of these fixes:</div>
            <div>1. Remove unnecessary custom headers.</div>
            <div>2. Reduce cookie size and count.</div>
            <div>3. Retry the request with shorter header values.</div>
        </div>
        <br>
        <a href="/">Back Home</a>
    </div>
</body>
</html>
