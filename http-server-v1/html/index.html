<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background: #f5f7fb;
        }
        .card {
            width: 520px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        a {
            display: inline-block;
            margin: 10px;
            padding: 12px 22px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        a:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 My First Web Server</h1>
        <p>This page is served by your epoll server.</p>
        <a href="/hello">Go to Hello Page</a>
        <a href="/time">Check Time</a>
    </div>
</body>
</html>
