<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>413 Payload Too Large</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background: #fff6f0;
        }
        .box {
            width: 520px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #ff7043;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        a:hover {
            background: #f4511e;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>413 Payload Too Large</h1>
        <p>Your request body is too large.</p>
        <a href="/">Back Home</a>
    </div>
</body>
</html>
